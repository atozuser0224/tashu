function section(id,note){
  const meta=SECTIONS.find(s=>s.id===id);
  const s=el("section");s.id=id;
  s.appendChild(el("div","sec-head",`<span class="sec-num">${meta.n}</span><h2>${meta.t}</h2>`));
  if(note)s.appendChild(el("p","sec-note",note));
  document.getElementById("main").appendChild(s);return s;
}
function table(cls,head,rows){
  const w=el("div","tablewrap");
  w.innerHTML=`<table class="${cls||""}"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
  return w;
}

(function(){
  const links=new Map([...document.querySelectorAll(".navrow a")].map(a=>[a.getAttribute("href").slice(1),a]));
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(!e.isIntersecting)return;
    links.forEach(a=>a.classList.remove("on"));links.get(e.target.id)?.classList.add("on");});},
    {rootMargin:"-52px 0px -72% 0px",threshold:0});
  document.querySelectorAll("main section").forEach(x=>io.observe(x));
})();
