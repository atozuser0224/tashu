  const s = el("section"); s.id = id;

  return s;
}

  const s = section("roadmap", "07", "로드맵", PLAN.roadmap.note);
  const render = (rows, done) => {
    const p = el("div", "phases");
    rows.forEach(r => p.appendChild(el("div", "phase" + (done ? " done" : ""), `
      <div class="pk"><span class="pid">${r.id}</span><span class="pnm">${esc(r.nm)}</span></div>
      <div class="pv">${r.v}</div>`)));
    return p;
  };
  s.appendChild(el("h3", null, "해커톤 수직 슬라이스"));
  s.appendChild(render(PLAN.roadmap.hackathon, true));
  s.appendChild(el("h3", null, "이후 승격 단계 — 날짜가 아니라 달성 조건"));
  s.appendChild(render(PLAN.roadmap.after, false));
  s.appendChild(el("h3", null, "중단 규칙"));
  const stops = el("div", "stops");
  PLAN.stopRules.items.forEach(t => stops.appendChild(el("div", "stop", `<span class="x">중단</span><span>${esc(t)}</span>`)));
  s.appendChild(stops);
})();

/* 08 — 운영 모델 */
(function () {
  const s = section("operating", "08", "운영 모델 — 사람 × AI 페어", PLAN.operating.note);
  const pr = el("div", "principles");
  PLAN.operating.principles.forEach(p => pr.appendChild(el("div", "principle",
    `<span class="pn"></span><span><b>${esc(p.b)}</b> <span>${esc(p.s)}</span></span>`)));
  s.appendChild(pr);

  const tr = el("div", "tracks");
  PLAN.operating.tracks.forEach(t => tr.appendChild(el("div", "track", `
    <div class="track-h"><span class="t">${esc(t.t)}</span><span class="s">${t.s}</span></div>
    <div class="track-b">
      <div class="split human"><span class="lbl">사람의 몫 — 결정·책임</span><span class="txt">${esc(t.human)}</span></div>
      <div class="split ai"><span class="lbl">AI의 몫 — 수행</span><span class="txt">${esc(t.ai)}</span></div>
    </div>`)));
  s.appendChild(tr);
  const gn = el("div", "stops");
  gn.style.marginTop = "16px";
  gn.appendChild(el("div", "stop", `<span class="x">불변</span><span>${esc(PLAN.operating.gateNote)}</span>`));
  s.appendChild(gn);
})();

/* 09 — enum 사전 */
(function () {
  const s = section("enums", "09", "enum 사전", PLAN.enums.note);
  const grid = el("div", "enums");
  PLAN.enums.groups.forEach(g => {
    const pairs = Object.entries(g.vals)
      .map(([k, v]) => `<div class="pair"><dt>${k}</dt><dd>${esc(v)}</dd></div>`).join("");
    grid.appendChild(el("div", "enum", `<div class="en">${g.en}</div><dl>${pairs}</dl>`));
  });
  s.appendChild(grid);
})();

/* 스크롤스파이 */
(function () {
  const links = new Map([...document.querySelectorAll(".navrow a")].map(a => [a.getAttribute("href").slice(1), a]));
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      links.forEach(a => a.classList.remove("on"));
      links.get(e.target.id)?.classList.add("on");
    });
  }, { rootMargin: "-52px 0px -72% 0px", threshold: 0 });
  document.querySelectorAll("main section").forEach(sec => io.observe(sec));
})();
</script>
